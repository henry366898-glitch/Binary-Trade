name: Deploy backend (edgetrade-api)

# Auto-deploys the FastAPI backend to the production server on every push to
# main, after a fast sanity-check gate. Frontend is deployed separately (Vercel).
#
# Required GitHub repo secrets (Settings -> Secrets and variables -> Actions):
#   DEPLOY_HOST      server IP / hostname
#   DEPLOY_USER      ssh user (e.g. root)
#   DEPLOY_PASSWORD  ssh password
# Optional:
#   DEPLOY_PORT      ssh port (defaults to 22 if unset)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-edgetrade-api
  cancel-in-progress: false

jobs:
  test:
    name: Sanity checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Byte-compile all backend modules
        working-directory: backend
        run: python -m compileall -q app
      - name: Sportsbook logic tests (no third-party deps)
        working-directory: backend
        run: python tests/test_sportsbook_logic.py
      - name: Odds API mapper tests (no third-party deps)
        working-directory: backend
        run: python tests/test_odds_api_mappers.py

  deploy:
    name: Deploy over SSH
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Pull, install deps, reload PM2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd ~/Binary-Trade
            echo "==> Syncing repo"
            git fetch --all --prune
            git checkout main
            git pull --ff-only origin main
            echo "==> Installing backend dependencies"
            cd backend
            venv/bin/pip install -q -r requirements.txt
            echo "==> Reloading PM2 process"
            pm2 reload edgetrade-api --update-env
            pm2 save
            echo "==> Deployed commit: $(git rev-parse --short HEAD)"
