##############################################################################
# EdgeTrade — nginx reverse proxy config
#
# Place this file at:  /etc/nginx/sites-available/edgetrade
# Then enable it:
#   ln -s /etc/nginx/sites-available/edgetrade /etc/nginx/sites-enabled/edgetrade
#   nginx -t && systemctl reload nginx
#
# Replace YOUR_DOMAIN_OR_IP with your actual domain or server IP.
# Replace /root/Binary-Trade/frontend/dist with the real path to the built frontend.
##############################################################################

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # ── Frontend (built static files) ────────────────────────────────────────
    root /root/Binary-Trade/frontend/dist;
    index index.html;

    # SPA fallback — all unknown paths serve index.html (React handles routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API (HTTP) ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts — trades settle in up to 10 min, keep connections alive
        proxy_read_timeout  660s;
        proxy_send_timeout  660s;
    }

    # ── WebSocket (price stream) ──────────────────────────────────────────────
    location /api/market/stream {
        proxy_pass         http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;     # keep WS alive for 1 hour
    }

    # ── Uploaded proof images ─────────────────────────────────────────────────
    location /uploads/ {
        alias /root/Binary-Trade/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options       SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy       strict-origin-when-cross-origin;
}
